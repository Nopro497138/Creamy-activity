<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plants vs. Zombies</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #pvz-app { width:100%; height:100%; }
    canvas { display:block; margin:0 auto; }
    #loading-screen {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:#78c832; font-family:'Arial Black',sans-serif; z-index:999;
    }
    #loading-title { font-size:32px; text-shadow:0 0 20px #78c832; margin-bottom:24px; }
    #loading-bar-bg { width:300px; height:18px; background:#1a3a00; border:2px solid #78c832; border-radius:9px; overflow:hidden; }
    #loading-bar    { width:0%; height:100%; background:linear-gradient(90deg,#3a8a00,#78c832); transition:width 0.2s; }
    #loading-text   { margin-top:12px; font-size:13px; color:#aaa; }
  </style>
</head>
<body>
<div id="loading-screen">
  <div id="loading-title">PLANTS vs. ZOMBIES</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-text">Loading...</div>
</div>
<div id="pvz-app"></div>

<!-- Phaser 3 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<!-- Discord Embedded App SDK via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/discord-embedded-app-sdk/1.0.0/discordSdk.min.js" onerror="console.warn('Discord SDK CDN failed, using stub')"></script>
<!-- Our game -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
