<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plants Mayhem</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #pvz-app { width:100%; height:100%; }
    canvas { display:block; margin:0 auto; image-rendering:auto !important; }

    /* Loading screen */
    #loading-screen {
      position:fixed; inset:0;
      background: radial-gradient(ellipse at center, #001800 0%, #000a00 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999;
    }
    #loading-logo {
      width:420px; max-width:80vw;
      margin-bottom:28px;
      opacity:0;
      animation: fadeInLogo 0.8s ease-out 0.2s forwards;
    }
    @keyframes fadeInLogo {
      from { opacity:0; transform:scale(0.88) translateY(12px); }
      to   { opacity:1; transform:scale(1)    translateY(0); }
    }
    #loading-bar-wrap {
      width:360px; max-width:78vw;
      height:22px;
      background:#0a1a00;
      border:2px solid #3a7a00;
      border-radius:11px;
      overflow:hidden;
      box-shadow: 0 0 18px #1a5000;
    }
    #loading-bar {
      width:0%;
      height:100%;
      background: linear-gradient(90deg, #2a6a00, #78c832, #aaff50);
      border-radius:11px;
      transition: width 0.18s ease;
    }
    #loading-text {
      margin-top:14px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #6a9a4a;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <img id="loading-logo" src="/assets/logo.png" alt="Plants Mayhem"
       onerror="this.style.display='none'"/>
  <div id="loading-bar-wrap">
    <div id="loading-bar" id="loading-bar"></div>
  </div>
  <div id="loading-text">Loading...</div>
</div>

<!-- Game canvas container -->
<div id="pvz-app"></div>

<!-- Phaser 3 from CDN — loaded before our modules -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"
        crossorigin="anonymous"
        onerror="document.getElementById('loading-text').textContent='ERROR: Could not load Phaser. Check your connection.'">
</script>

<!-- Game entry point -->
<script type="module" src="/src/main.js"></script>

</body>
</html>
